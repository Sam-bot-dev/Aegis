# Firebase App Hosting config for the Aegis Staff PWA.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# IMPORTANT: every NEXT_PUBLIC_* below is inlined into the browser bundle at
# build time. They are public by definition (anyone with DevTools can read
# them), so plain `value:` is correct. Do NOT promote them to Secret Manager
# unless you also accept the IAM-grant overhead.
#
# After editing values, push to main; App Hosting rebuilds automatically.

runConfig:
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512

env:
  # ---- Firebase Web SDK config (from Firebase Console → Project Settings → Web app) ----
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: aegis-gsc-2026
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: aegis-gsc-2026.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: aegis-gsc-2026.appspot.com
    availability: [BUILD, RUNTIME]
  # TODO: paste real values from Firebase Console once the web app is registered.
  # The build will succeed with placeholders, but Firestore listeners will throw
  # "auth/invalid-api-key" until these are populated.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: REPLACE_WITH_FIREBASE_WEB_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: REPLACE_WITH_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: REPLACE_WITH_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]

  # ---- Demo defaults ----
  - variable: NEXT_PUBLIC_DEMO_VENUE_ID
    value: taj-ahmedabad
    availability: [BUILD, RUNTIME]

  # ---- Backend service URLs (from `gcloud run services list`) ----
  - variable: NEXT_PUBLIC_INGEST_URL
    value: REPLACE_WITH_INGEST_RUN_URL
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_VISION_URL
    value: REPLACE_WITH_VISION_RUN_URL
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_ORCHESTRATOR_URL
    value: REPLACE_WITH_ORCHESTRATOR_RUN_URL
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_DISPATCH_URL
    value: REPLACE_WITH_DISPATCH_RUN_URL
    availability: [BUILD, RUNTIME]

  # ---- Cross-app link (App Hosting backend URL for the dashboard) ----
  - variable: NEXT_PUBLIC_DASHBOARD_URL
    value: REPLACE_WITH_DASHBOARD_APPHOSTING_URL
    availability: [BUILD, RUNTIME]
