name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy services agents

      - name: Detect pytest files
        id: detect_pytests
        shell: bash
        run: |
          if find services -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pytest
        if: steps.detect_pytests.outputs.has_tests == 'true'
        run: pytest --cov=services --cov-report=term-missing

      - name: Skip pytest when no tests exist
        if: steps.detect_pytests.outputs.has_tests != 'true'
        run: echo "No Python tests found yet. Skipping pytest."

  web-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace deps
        run: npm install

      - name: Lint web apps
        run: npm run lint

      - name: Build staff app
        run: npm run build:staff

      - name: Build dashboard app
        run: npm run build:dashboard
