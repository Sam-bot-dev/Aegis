# Local dev stack: Firestore + Pub/Sub emulators.
# Services themselves run natively via uvicorn (faster iteration).
# Start: `make emulators`   Stop: `make stop`

services:
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: aegis-firestore
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8080
      --project=aegis-local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 5

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: aegis-pubsub
    command: >
      gcloud emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=aegis-local
    ports:
      - "8085:8085"

  # Optional: Redis for Memorystore equivalent locally
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"

networks:
  default:
    name: aegis-local
