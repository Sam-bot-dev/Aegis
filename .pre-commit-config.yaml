repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, services, agents]
        pass_filenames: false
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - fastapi

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        files: \.(css|json|md|mjs|ts|tsx|ya?ml)$

  - repo: local
    hooks:
      - id: eslint-web
        name: eslint-web
        entry: npm run lint
        language: system
        pass_filenames: false
        files: ^(apps|packages)/.*\.(css|js|jsx|mjs|ts|tsx)$
